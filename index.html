<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Gungunii ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
text-align:center;
overflow:hidden;
}

.page{
display:none;
height:100vh;
width:100%;
position:absolute;
top:0;
left:0;
flex-direction:column;
justify-content:center;
align-items:center;
}

.active{
display:flex;
}

#page1{
background:#fff8c9;
}

#page2{
background:#ffd6ea;
}

#page3{
background:#ffeef6;
}

.bg-emoji{
position:absolute;
width:100%;
height:100%;
opacity:0.25;
font-size:22px;
line-height:32px;
z-index:-1;
pointer-events:none;
}

.pic{
width:260px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.left{
align-self:flex-start;
margin-left:10%;
}

.right{
align-self:flex-end;
margin-right:10%;
}

.question{
font-family:'Pacifico';
font-size:32px;
margin:15px;
}

.btn{
background:#ff8dc7;
padding:15px 30px;
border-radius:25px;
cursor:pointer;
font-size:18px;
color:white;
margin:10px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

.no-btn{
background:#ff4d6d;
}

.note{
max-width:420px;
font-size:20px;
min-height:140px;
margin-bottom:20px;
}

.buttons{
display:flex;
gap:20px;
}

/* floating hearts */

.heart{
position:absolute;
font-size:22px;
animation:float 6s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* thank you */

.thanks{
font-size:70px;
font-family:'Pacifico';
}

/* popup */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
font-size:26px;
display:none;
z-index:1000;
}

</style>
</head>

<body>

<div class="popup" id="popup">
🥺 Gungunii forgave Noni ❤️
</div>

<!-- PAGE 1 -->

<div id="page1" class="page active">

<div class="bg-emoji">
🥹🥹🥹🥹🥹🥹🥹🥹🥹🥹🥹🥹🥹🥹🥹🥹🥹🥹🥹🥹
</div>

<img src="pic1.jpg" class="pic centre">

<div class="question">
AAP MERSE NARAZ HO? 🥹
</div>

<button class="btn" onclick="openPage2()">
ISKO OPEN KARO
</button>

</div>

<!-- PAGE 2 -->

<div id="page2" class="page">

<div class="bg-emoji">
💐💐💐💐💐💐💐💐💐💐💐💐💐💐💐💐💐💐💐💐
</div>

<img src="pic2.jpg" class="pic centre">

<div class="note" id="typingText"></div>

<div class="buttons">
<div class="btn" onclick="acceptApology()">APOLOGY ACCEPTED</div>
<div class="btn no-btn" id="noBtn">NO</div>
</div>

</div>

<!-- PAGE 3 -->

<div id="page3" class="page">
<div class="thanks">THANK YOU ❤️</div>
</div>

<script>

/* page switch */

function openPage2(){
document.getElementById("page1").classList.remove("active")
document.getElementById("page2").classList.add("active")
startTyping()
}

/* typing text */

const text=`Hi Gungunii

I am sorry if I disappointed you again.
I don't know why and how I always do this but ruin it.
Noni is always here for you and will never let anything bad happen to you.`

let i=0

function startTyping(){
let speed=40
function type(){
if(i<text.length){
document.getElementById("typingText").innerHTML+=text.charAt(i)
i++
setTimeout(type,speed)
}
}
type()
}

/* NO button escape */

const noBtn=document.getElementById("noBtn")

noBtn.addEventListener("mouseover",()=>{
let x=Math.random()*300-150
let y=Math.random()*200-100
noBtn.style.transform=`translate(${x}px,${y}px)`
})

/* floating hearts */

for(let i=0;i<30;i++){
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="💖"
heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(4+Math.random()*4)+"s"
document.body.appendChild(heart)
}

/* accept apology */

function acceptApology(){

document.getElementById("popup").style.display="block"

heartExplosion()

setTimeout(()=>{
document.getElementById("popup").style.display="none"
document.getElementById("page2").classList.remove("active")
document.getElementById("page3").classList.add("active")
confetti()
},2000)

}

/* heart explosion */

function heartExplosion(){
for(let i=0;i<40;i++){
let h=document.createElement("div")
h.className="heart"
h.innerHTML="💖"
h.style.left="50vw"
h.style.top="50vh"
h.style.fontSize="30px"
h.style.animationDuration="3s"
document.body.appendChild(h)
}
}

/* confetti */

function confetti(){
for(let i=0;i<60;i++){
let conf=document.createElement("div")
conf.className="heart"
conf.innerHTML=["🍫","💐","💖"][Math.floor(Math.random()*3)]
conf.style.left=Math.random()*100+"vw"
conf.style.fontSize="28px"
conf.style.animationDuration=(3+Math.random()*3)+"s"
document.body.appendChild(conf)
}
}

</script>

</body>

</html>
